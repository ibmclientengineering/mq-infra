apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: mq-qm-promote
  labels:
    app.kubernetes.io/part-of: mq-infra
  annotations:
    description: Gate-test a deployed queue manager, then promote its overlay to the next environment as a pull request.
spec:
  description: >-
    The promotion half of the MQ factory. It gates on evidence — a functional put/get through a
    dedicated gate queue on the queue manager in the source environment — and only then copies that
    proven overlay forward and opens a pull request to the next environment. A machine assembles the
    evidence; a human reads the diff and merges; Argo CD deploys. Reusable for any MQ hop
    (dev→staging, staging→prod) via params. The `ibm-gitops-promote` task is product-generic (point
    `product-path` at ace/environments to reuse it for ACE, paired with an ACE-appropriate gate).
  params:
    - name: unit
      default: mq-qm01
    - name: qm-name
      default: QM1
    - name: qm-pod-grep
      description: Substring matching the queue-manager pod (thread this if the QM name isn't the default).
      default: qm1-ibm-mq
    - name: gate-queue
      default: PROMOTE.GATE.Q
    - name: src-env
      default: staging
    - name: target-env
      default: prod
    - name: product-path
      default: mq/environments
  tasks:
    - name: gate-test
      taskRef:
        name: ibm-mq-gate-test
      params:
        - { name: qm-namespace, value: "$(params.src-env)" }
        - { name: qm-pod-grep, value: "$(params.qm-pod-grep)" }
        - { name: qm-name, value: "$(params.qm-name)" }
        - { name: gate-queue, value: "$(params.gate-queue)" }
    - name: promote
      runAfter: [ gate-test ]
      taskRef:
        name: ibm-gitops-promote
      params:
        - { name: product-path, value: "$(params.product-path)" }
        - { name: unit, value: "$(params.unit)" }
        - { name: src-env, value: "$(params.src-env)" }
        - { name: target-env, value: "$(params.target-env)" }
