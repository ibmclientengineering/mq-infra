# mq-spring-app-dev — the application half of the MQ CI/CD story.
# Reuses the proven mq-qm-dev factory tasks (ibm-setup, ibm-build-tag-push,
# ibm-tag-release, ibm-img-release) and swaps the QM-specific smoke/delivery for
# an app smoke-test that proves the built image reaches a LIVE queue manager.
# tekton.dev/v1.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: mq-spring-app-dev
  annotations:
    app.openshift.io/runtime: spring
    description: Build the mq-spring-app image, smoke-test it against a live queue manager (send/recv round trip), and release it.
spec:
  params:
    - name: git-url
      default: https://github.com/ibmclientengineering/mq-spring-app.git
    - name: git-revision
      default: master
    - name: scan-image
      default: "false"
    - name: image-url
      default: quay.io/apalumbo925/mq-spring-app
    - name: qm
      default: QUICKSTART
    - name: conn-name
      default: mq-quickstart-ibm-mq.tools.svc.cluster.local(1414)
    - name: channel
      default: IBM.APP.SVRCONN
    - name: queue-name
      default: IBM.DEMO.Q
  tasks:
    - name: setup
      taskRef: { name: ibm-setup }
      params:
        - { name: git-url, value: "$(params.git-url)" }
        - { name: git-revision, value: "$(params.git-revision)" }
        - { name: scan-image, value: "$(params.scan-image)" }
        - { name: image-url, value: "$(params.image-url)" }
    - name: build
      taskRef: { name: ibm-build-tag-push }
      runAfter: [ setup ]
      params:
        - { name: git-url, value: "$(tasks.setup.results.git-url)" }
        - { name: git-revision, value: "$(tasks.setup.results.git-revision)" }
        - { name: source-dir, value: "$(tasks.setup.results.source-dir)" }
        - { name: image-server, value: "$(tasks.setup.results.image-server)" }
        - { name: image-namespace, value: "$(tasks.setup.results.image-namespace)" }
        - { name: image-repository, value: "$(tasks.setup.results.image-repository)" }
        - { name: image-tag, value: "$(tasks.setup.results.image-tag)" }
    - name: tag-release
      taskRef: { name: ibm-tag-release }
      runAfter: [ build ]
      params:
        - { name: git-url, value: "$(tasks.setup.results.git-url)" }
        - { name: git-revision, value: "$(tasks.setup.results.git-revision)" }
        - { name: source-dir, value: "$(tasks.setup.results.source-dir)" }
        - { name: js-image, value: "$(tasks.setup.results.js-image)" }
    - name: img-release
      taskRef: { name: ibm-img-release }
      runAfter: [ tag-release ]
      params:
        - { name: image-from, value: "$(tasks.setup.results.image-url)" }
        - { name: image-to, value: "$(tasks.setup.results.image-release):$(tasks.tag-release.results.tag)" }
    - name: app-smoke-test
      taskRef: { name: ibm-app-smoke-test }
      runAfter: [ img-release ]
      params:
        - { name: image-url, value: "$(tasks.img-release.results.image-url)" }
        - { name: qm, value: "$(params.qm)" }
        - { name: conn-name, value: "$(params.conn-name)" }
        - { name: channel, value: "$(params.channel)" }
        - { name: queue-name, value: "$(params.queue-name)" }
