apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ibm-gitops-promote
  labels:
    app.kubernetes.io/part-of: mq-infra
  annotations:
    description: Promote a proven overlay to the next environment by copying it and opening a pull request.
spec:
  description: >-
    Promotion as a pull request. Copies a proven overlay from one environment directory to the
    next in the gitops-apps repo, rebuilds the target environment's kustomization from the units
    present, and opens a PR — the machine proposes, a human merges, Argo CD deploys. Generic
    across products (MQ, ACE) and environment hops via params. Needs the git-credentials secret
    (a PAT with repo scope). All params are passed as env vars (never interpolated into the
    script) and the PR JSON is built with jq, so param values cannot inject shell/JSON.
  params:
    - name: gitops-org-repo
      description: "org/repo of the gitops-apps repository."
      default: ibmclientengineering/multi-tenancy-gitops-apps
    - name: product-path
      description: The environments root for the product (e.g. mq/environments, ace/environments).
      default: mq/environments
    - name: unit
      description: The unit subdirectory to promote (e.g. mq-qm01, createcustomer).
      default: mq-qm01
    - name: src-env
      description: Source environment to promote FROM.
      default: staging
    - name: target-env
      description: Target environment to promote TO.
      default: prod
    - name: base-branch
      default: master
  steps:
    - name: promote
      image: docker.io/alpine/git:2.45.2
      env:
        - name: GIT_USER
          valueFrom: { secretKeyRef: { name: git-credentials, key: username } }
        - name: GIT_PASS
          valueFrom: { secretKeyRef: { name: git-credentials, key: password } }
        # params as env values (inert — not substituted into the script body)
        - name: GITOPS_ORG_REPO
          value: $(params.gitops-org-repo)
        - name: PRODUCT_PATH
          value: $(params.product-path)
        - name: UNIT
          value: $(params.unit)
        - name: SRC_ENV
          value: $(params.src-env)
        - name: TARGET_ENV
          value: $(params.target-env)
        - name: BASE_BRANCH
          value: $(params.base-branch)
      script: |
        #!/bin/sh
        set -e
        apk add --no-cache curl jq >/dev/null 2>&1 || true
        cd /tmp; rm -rf ga
        git clone --depth 1 -b "$BASE_BRANCH" "https://${GIT_USER}:${GIT_PASS}@github.com/${GITOPS_ORG_REPO}.git" ga
        cd ga
        SRC="${PRODUCT_PATH}/${SRC_ENV}/${UNIT}"
        DST="${PRODUCT_PATH}/${TARGET_ENV}/${UNIT}"
        [ -d "$SRC" ] || { echo "Source overlay $SRC not found"; exit 1; }
        BRANCH="promote-${UNIT}-${SRC_ENV}-to-${TARGET_ENV}"
        git checkout -B "$BRANCH"
        ENVDIR="${PRODUCT_PATH}/${TARGET_ENV}"
        mkdir -p "$ENVDIR"
        rm -rf "$DST"; cp -r "$SRC" "$DST"
        # rebuild the target-env kustomization from the units actually present (robust + idempotent)
        {
          echo "apiVersion: kustomize.config.k8s.io/v1beta1"
          echo "kind: Kustomization"
          echo "resources:"
          for d in "$ENVDIR"/*/; do [ -d "$d" ] && echo "  - $(basename "$d")"; done
        } > "$ENVDIR/kustomization.yaml"
        git config user.email "tekton@ibmclientengineering"
        git config user.name "gitops promote pipeline"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes — ${TARGET_ENV} already matches ${SRC_ENV}. Nothing to promote."
          exit 0
        fi
        git commit -m "Promote ${UNIT}: ${SRC_ENV} -> ${TARGET_ENV}"
        git push -f origin "$BRANCH"
        # open a PR — build the JSON with jq (no hand-quoting), pass the token via stdin (not argv)
        TITLE="Promote ${UNIT}: ${SRC_ENV} -> ${TARGET_ENV}"
        BODY="Automated promotion PR. The functional gate passed on ${SRC_ENV}. Merge = go-live to ${TARGET_ENV}; Argo CD reconciles the target overlay."
        PAYLOAD=$(jq -n --arg t "$TITLE" --arg h "$BRANCH" --arg b "$BASE_BRANCH" --arg body "$BODY" \
          '{title:$t, head:$h, base:$b, body:$body}')
        RESP=$(printf 'Authorization: token %s\n' "$GIT_PASS" \
          | curl -s -X POST -H @- -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITOPS_ORG_REPO}/pulls" -d "$PAYLOAD")
        URL=$(echo "$RESP" | jq -r '.html_url // empty')
        if [ -n "$URL" ]; then
          echo "PROMOTION PR: $URL"
        else
          MSG=$(echo "$RESP" | jq -r '.errors[0].message // .message // "unknown error"')
          if echo "$MSG" | grep -qi "already exists"; then
            echo "A promotion PR for $BRANCH already exists; its branch was updated."
          else
            echo "PR creation FAILED: $MSG"; echo "$RESP" | head -c 600; exit 1
          fi
        fi
