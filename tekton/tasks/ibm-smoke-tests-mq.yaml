# Vendored from IBM/ibm-garage-tekton-tasks (tasks/4-smoke-tests-mq.yaml), Apache-2.0.
# Modernized July 2026:
#   - tekton.dev/v1
#   - runAsUser: 0 on deploy/health-check/cleanup steps (cluster-proven fix:
#     non-root tools-image steps could not write the root-owned clone dir on a
#     shared emptyDir under current pod security)
#   - tools image ibmcloud-dev:v2.0.4 (EOL, yq v3) replaced with alpine/k8s
#     (kubectl + helm + jq + yq v4); scripts rewritten for yq v4 syntax
#   - new security/ha params passed through to the helm chart (mq-qm01's
#     chart/base supports both values; security=true selects chart/base/security
#     MQSC, ha=true selects the NativeHA availability block)
#   - upstream bug fix: health-check hard-coded RELEASE_NAME="qm-dev"; the pod
#     selector now uses the qmgr-name param (the QueueManager CR name, which is
#     what the MQ operator stamps into app.kubernetes.io/instance)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ibm-smoke-tests-mq
  annotations:
    description: Deploys the application to the CI environment for verification using the provided helm chart
    app.openshift.io/description: Deploys the application to the CI environment for verification using the provided helm chart
    app.openshift.io/vcs-uri: https://github.com/ibmclientengineering/mq-infra
    app.openshift.io/vcs-ref: master
  labels:
    version: 1.0.0
spec:
  params:
    - name: git-url
    - name: git-revision
      default: master
    - name: source-dir
      default: /source
    - name: image-server
      default: ""
    - name: image-namespace
      default: ""
    - name: image-repository
      default: ""
    - name: image-tag
      default: ""
    - name: app-namespace
      default: ""
    - name: app-name
      default: ""
    - name: deploy-ingress-type
      default: "route"
    - name: tools-image
      default: docker.io/alpine/k8s:1.33.13
    - name: security
      description: Deploy the candidate with the chart's security MQSC flavor (chart/base/security)
      default: "false"
    - name: ha
      description: Deploy the candidate with NativeHA availability (chart value ha=true; requires the chart's TLS cert secret)
      default: "false"
    - name: qmgr-name
      description: The QueueManager CR name the chart deploys (.Values.name); used to locate the qmgr pod
      default: "qm1"
  results:
    - name: service-port
    - name: resource-type
  volumes:
    - name: source
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - name: source
        mountPath: $(params.source-dir)
  steps:
    - name: git-clone
      image: docker.io/alpine/git:2.54.0
      env:
        - name: GIT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: password
              optional: true
        - name: GIT_USERNAME
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: username
              optional: true
      script: |
        set +x
        if [[ -n "${GIT_USERNAME}" ]] && [[ -n "${GIT_PASSWORD}" ]]; then
            git clone "$(echo $(params.git-url) | awk -F '://' '{print $1}')://${GIT_USERNAME}:${GIT_PASSWORD}@$(echo $(params.git-url) | awk -F '://' '{print $2}')" $(params.source-dir)
        else
            set -x
            git clone $(params.git-url) $(params.source-dir)
        fi
        set -x
        cd $(params.source-dir)
        git checkout $(params.git-revision)
    - name: deploy
      image: $(params.tools-image)
      workingDir: $(params.source-dir)
      securityContext:
        runAsUser: 0
      env:
        - name: TLS_SECRET_NAME
          valueFrom:
            configMapKeyRef:
              name: ibmcloud-config
              key: TLS_SECRET_NAME
              optional: true
        - name: INGRESS_SUBDOMAIN
          valueFrom:
            configMapKeyRef:
              name: ibmcloud-config
              key: INGRESS_SUBDOMAIN
              optional: true
      script: |
          #!/usr/bin/env bash
          set -ex
          GIT_URL="$(params.git-url)"
          GIT_REVISION="$(params.git-revision)"
          APP_NAMESPACE="$(params.app-namespace)"
          APP_NAME="$(params.app-name)"
          if [[ -z "${APP_NAME}" ]]; then
            APP_NAME="$(params.image-repository)"
          fi
          IMAGE_SERVER="$(params.image-server)"
          IMAGE_NAMESPACE="$(params.image-namespace)"
          IMAGE_REPOSITORY="$(params.image-repository)"
          IMAGE_VERSION="$(params.image-tag)"
          IMAGE_URL="${IMAGE_SERVER}/${IMAGE_NAMESPACE}/${IMAGE_REPOSITORY}"
          INGRESS_TYPE="$(params.deploy-ingress-type)"
          if [[ "${INGRESS_TYPE}" == "route" ]]; then
            ROUTE_ENABLED="true"
            INGRESS_ENABLED="false"
          else
            ROUTE_ENABLED="false"
            INGRESS_ENABLED="true"
          fi

          export CHART_ROOT=$(find . -name chart)
          echo "CHART_ROOT: $CHART_ROOT"

          FILE_NUM=$(find . -name 'Chart*.yaml' |wc -l)
          if [[ "${FILE_NUM}" -gt 1 ]]; then
            echo "Error: Found >1 Chart*.yaml"
            exit 1
          fi

          export CHART=$(find . -name 'Chart*.yaml')
          echo "CHART: $CHART"

          export CHART_NAME=$(yq e '.name' "${CHART}")
          echo "CHART_NAME: $CHART_NAME"

          # Update Chart name and version
          if [[ "${CHART_NAME}" != "${APP_NAME}" ]]; then
            echo "Renaming chart from ${CHART_NAME} to ${APP_NAME}"
            cp -R "${CHART_ROOT}/${CHART_NAME}" "${CHART_ROOT}/${APP_NAME}"
            yq e ".name = \"${APP_NAME}\" | .version = \"1.0.0-rc${IMAGE_VERSION}\"" \
              "${CHART_ROOT}/${CHART_NAME}/Chart.yaml" > "${CHART_ROOT}/${APP_NAME}/Chart.yaml"
          else
            echo "Chart name and image name match: ${APP_NAME}"
          fi

          CHART_PATH="${CHART_ROOT}/${APP_NAME}"

          RELEASE_NAME="${APP_NAME}"
          echo "RELEASE_NAME: $RELEASE_NAME"

          echo $(helm version)

          echo "CHECKING CHART (lint)"
          helm lint ${CHART_PATH}

          PREFIX=""
          if [[ -f "${CHART_PATH}/requirements.yaml" ]] || grep -Eq "^dependencies:" "${CHART_PATH}/Chart.yaml"; then
              DEPENDENCY_FILE="${CHART_PATH}/Chart.yaml"
              if [[ -f "${CHART_PATH}/requirements.yaml" ]]; then
                  DEPENDENCY_FILE="${CHART_PATH}/requirements.yaml"
              fi

              PREFIX="$(yq e -o=json '.' "${DEPENDENCY_FILE}" | jq -r '.dependencies | .[] | .alias // .name' | head -1)."
          fi

          # Update helm chart with repository and tag values
          yq e ".${PREFIX}nameOverride = \"${APP_NAME}\" |
                .${PREFIX}fullnameOverride = \"${APP_NAME}\" |
                .${PREFIX}vcsInfo.repoUrl = \"${GIT_URL}\" |
                .${PREFIX}vcsInfo.branch = \"${GIT_REVISION}\" |
                .${PREFIX}image.repository = \"${IMAGE_URL}\" |
                .${PREFIX}image.tag = \"${IMAGE_VERSION}\" |
                .${PREFIX}image.tag style=\"single\" |
                .${PREFIX}ingress.enabled = ${INGRESS_ENABLED} |
                .${PREFIX}route.enabled = ${ROUTE_ENABLED}" \
            "${CHART_PATH}/values.yaml" > ./values.yaml.tmp
          cp ./values.yaml.tmp ${CHART_PATH}/values.yaml
          cat ${CHART_PATH}/values.yaml

          helm dep update "${CHART_PATH}"

          # Render the candidate release with the requested security/ha flavor
          helm template ${RELEASE_NAME} ${CHART_PATH} \
              --namespace ${APP_NAMESPACE} \
              --set ${PREFIX}security="$(params.security)" \
              --set ${PREFIX}ha="$(params.ha)" \
              --set ${PREFIX}ingress.tlsSecretName="${TLS_SECRET_NAME}" \
              --set ${PREFIX}ingress.subdomain="${INGRESS_SUBDOMAIN}" > ./release.yaml

          echo -e "Generated release yaml for: ${APP_NAMESPACE}/${APP_NAME}"
          cat ./release.yaml

          echo -e "Deploying into: ${APP_NAMESPACE}/${APP_NAME}"
          kubectl apply -n ${APP_NAMESPACE} -f ./release.yaml --validate=false > results.out
          cat results.out
          echo "Waiting for rollout of ${APP_NAMESPACE}/${APP_NAME}"


          cat results.out | \
            grep -E "deployment|statefulset|integrationserver|queuemanager" | \
            sed "s/deployment.apps/deployment/g" | \
            sed "s/statefulset.apps/statefulset/g" | \
            sed "s/configured//g" | \
            sed "s/created//g" | \
            sed "s/unchanged//g" | while read target; do
            echo "Waiting for rollout of ${target} in ${APP_NAMESPACE}"
            if [[ ${target} == *"integrationserver"* ]]; then
              kubectl wait --timeout=-1s --for=condition=Ready ${target}
            elif [[ ${target} == *"queuemanager"* ]]; then
              until [[ "$(kubectl get ${target} -o 'jsonpath={.status.phase}')" = "Running" ]];
              do
              sleep 5
              echo "Waiting for Queuemanager to be ready."
              done
            else
              kubectl rollout status -n ${APP_NAMESPACE} ${target}
              SERVICE_PORT=$(kubectl get svc "${APP_NAME}" -n "${APP_NAMESPACE}" -o jsonpath="{.spec.ports[?(@.name == 'http')].port}")
              echo -n "${SERVICE_PORT}" | tee $(results.service-port.path)
            fi
            echo -n "${target}" | cut -f1 -d / | tee $(results.resource-type.path)
          done
    - name: health-check
      image: $(params.tools-image)
      securityContext:
        runAsUser: 0
      script: |
          #!/usr/bin/env bash
          set -x

          # The MQ operator labels qmgr pods with
          # app.kubernetes.io/instance=<QueueManager CR name>
          QMGR_NAME="$(params.qmgr-name)"
          echo "QMGR_NAME: $QMGR_NAME"

          podname=$(kubectl get pods --selector=app.kubernetes.io/instance=$QMGR_NAME -o custom-columns=POD:.metadata.name --no-headers | head -n 1)
          echo "podname: $podname"

          queue="QM1"
          echo "queue name: $queue"

          echo "Sleep before test to make sure QMGR is up"
          sleep 20

          echo "Print the queue details: ..."
          echo ""
          kubectl exec $podname -- /bin/bash -c "echo \"define qlocal($queue) replace\" | runmqsc "

          echo "Print the queue details: ..."
          echo ""
          kubectl exec $podname -- /bin/bash -c "echo \"DISPLAY QL($queue) ALL\" | runmqsc" > checkQ.txt 2>&1
          cat checkQ.txt

          if grep -q "QUEUE($queue)" checkQ.txt; then
            echo "Queue has been successfully created."
          else
            exit 1
          fi

          # put message on queue
          kubectl exec $podname -- /bin/bash -c "echo \"hello-world\" | /opt/mqm/samp/bin/amqsput $queue" > putMessage.txt 2>&1
          cat putMessage.txt
          echo "----------"
          fail="reason code"
          if grep -q "$fail" putMessage.txt; then
            exit 1
          else
            echo "Message has been successfully put the queue."
          fi

          # get message on queue
          kubectl exec $podname  -c qmgr -- /opt/mqm/samp/bin/amqsget $queue > getMessage.txt 2>&1
          cat getMessage.txt
          if grep -q "hello-world" getMessage.txt; then
              echo "Message has been found on the queue."
          else
              echo "Error: Message has not been retrieved from the queue."
              exit 1
          fi
    - name: cleanup
      image: $(params.tools-image)
      workingDir: $(params.source-dir)
      securityContext:
        runAsUser: 0
      env:
        - name: TLS_SECRET_NAME
          valueFrom:
            configMapKeyRef:
              name: ibmcloud-config
              key: TLS_SECRET_NAME
              optional: true
        - name: INGRESS_SUBDOMAIN
          valueFrom:
            configMapKeyRef:
              name: ibmcloud-config
              key: INGRESS_SUBDOMAIN
              optional: true
      script: |
          #!/usr/bin/env bash
          set -ex

          APP_NAMESPACE="$(params.app-namespace)"

          kubectl delete -n ${APP_NAMESPACE} -f ./release.yaml
