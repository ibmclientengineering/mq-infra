apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ibm-mq-gate-test
  labels:
    app.kubernetes.io/part-of: mq-infra
  annotations:
    description: Functional promotion gate — put a message on a deployed queue manager and read it back before allowing promotion.
spec:
  description: >-
    The gate that guards a promotion. Puts a message on a queue on the deployed queue manager
    and reads it back, proving the environment actually processes messages before its config is
    promoted onward. Reusable across environments (dev / staging) via params. The pipeline SA
    needs exec on the queue manager's namespace.
  params:
    - name: qm-namespace
      description: Namespace of the queue manager to gate-test.
      default: staging
    - name: qm-pod-grep
      description: Substring matching the queue manager pod name.
      default: qm1-ibm-mq
    - name: qm-name
      description: The queue manager name (QMNAME).
      default: QM1
    - name: queue
      description: A local queue to round-trip a message through.
      default: IBM.DEMO.Q
  steps:
    - name: put-get
      image: quay.io/openshift/origin-cli:4.18
      script: |
        #!/bin/bash
        set -e
        NS="$(params.qm-namespace)"
        POD=$(oc get pods -n "$NS" --field-selector=status.phase=Running -o name | grep "$(params.qm-pod-grep)" | head -1)
        [ -n "$POD" ] || { echo "No running queue-manager pod matching '$(params.qm-pod-grep)' in $NS"; exit 1; }
        POD=${POD#pod/}
        echo "Gate-testing queue manager $(params.qm-name) via pod $POD in $NS"
        MARKER="promote-gate-check-marker"
        oc exec -n "$NS" "$POD" -- bash -c "echo '$MARKER' | /opt/mqm/samp/bin/amqsput $(params.queue) $(params.qm-name)"
        OUT=$(oc exec -n "$NS" "$POD" -- bash -c "/opt/mqm/samp/bin/amqsget $(params.queue) $(params.qm-name)" 2>&1 || true)
        if echo "$OUT" | grep -q "$MARKER"; then
          echo "GATE PASS: a message round-tripped through $(params.qm-name) — the environment is functional, promotion may proceed."
        else
          echo "GATE FAIL: the test message was not read back."; echo "$OUT" | tail -8; exit 1
        fi
